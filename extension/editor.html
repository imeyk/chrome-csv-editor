<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit CSV</title>
  <link rel="icon" type="image/png" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/icon128.png">
  <style>
    html, body { margin: 0; height: 100%; }
    /* full-bleed editor; opening lives in the editor header ("Open CSV" button),
       dropping a .csv anywhere on the page also opens/replaces it. */
    body { height: 100vh; background: #fff; }
    #editor-frame { border: 0; width: 100%; height: 100vh; display: block; }
    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; }
    }
  </style>
</head>
<body>
  <iframe id="editor-frame" src="../csvEditorHtml/sandbox.html"></iframe>
  <script type="module" src="editor-host.mjs"></script>
</body>
</html>
