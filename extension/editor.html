<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit CSV</title>
  <link rel="icon" type="image/png" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/icon128.png">
  <style>
    html, body { margin: 0; height: 100%; }
    /* full-bleed editor; opening lives in the editor header ("Open CSV" button),
       dropping a .csv anywhere on the page also opens/replaces it. */
    body { display: flex; flex-direction: column; height: 100vh; background: #fff; }
    #editor-frame { border: 0; width: 100%; flex: 1 1 auto; display: block; }

    /* One-time hint to enable "Allow access to file URLs" (shown by editor-host.mjs). */
    #file-access-banner {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      font: 13px system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #fff7d6;
      color: #4a3f00;
      border-bottom: 1px solid #e6d488;
    }
    #file-access-banner[hidden] { display: none; }
    #file-access-banner .fab-text { flex: 1 1 auto; }
    #file-access-banner button {
      flex: 0 0 auto;
      font: inherit;
      cursor: pointer;
      border-radius: 5px;
      padding: 4px 10px;
      border: 1px solid currentColor;
      background: transparent;
      color: inherit;
    }
    #file-access-banner #fab-open-settings { background: #4a3f00; color: #fff7d6; border-color: #4a3f00; }
    #file-access-banner #fab-close { border: none; font-size: 16px; line-height: 1; padding: 4px 8px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; }
      #file-access-banner { background: #3a3410; color: #f4e9b0; border-bottom-color: #5c5320; }
      #file-access-banner #fab-open-settings { background: #f4e9b0; color: #3a3410; border-color: #f4e9b0; }
    }
  </style>
</head>
<body>
  <div id="file-access-banner" hidden>
    <span class="fab-text"></span>
    <button id="fab-open-settings"></button>
    <button id="fab-close" aria-label="Dismiss">✕</button>
  </div>
  <!-- src is set by editor-host.mjs so it can append the browser language (?lang=) -->
  <iframe id="editor-frame"></iframe>
  <script type="module" src="editor-host.mjs"></script>
</body>
</html>
