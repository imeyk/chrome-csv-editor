<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit CSV</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body { display: flex; flex-direction: column; height: 100vh; background: #fff; }
    #toolbar {
      flex: 0 0 auto;
      font: 13px system-ui;
      padding: 6px 10px;
      background: #f3f3f3;
      border-bottom: 1px solid #ddd;
      color: #222;
    }
    #toolbar .hint { color: #666; margin-left: 8px; }
    #editor-frame { border: 0; width: 100%; flex: 1 1 auto; display: block; }
    /* Once a file is open, reclaim the toolbar's space (drag-drop still works). */
    body.file-loaded #toolbar { display: none; }
    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; }
      #toolbar { background: #2b2b2b; border-bottom-color: #444; color: #ddd; }
      #toolbar .hint { color: #999; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="open-btn">Open CSV…</button>
    <span class="hint">or drag a .csv file here</span>
  </div>
  <iframe id="editor-frame" src="../csvEditorHtml/sandbox.html"></iframe>
  <script type="module" src="editor-host.mjs"></script>
</body>
</html>
